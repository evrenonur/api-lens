name: 🚀 Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feature suggestion! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Describe the feature you'd like
      placeholder: What feature would you like to see?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem it Solves
      description: What problem would this feature solve?
      placeholder: Currently I can't... / I'm struggling with...

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision it working?
      placeholder: |
        ```php
        // Example usage
        // @api-lens-response 200 schema:UserResource
        ```

  - type: dropdown
    id: type
    attributes:
      label: Feature Type
      options:
        - New annotation support
        - UI enhancement
        - New export format
        - Extractor improvement
        - Performance improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to contribute?
      options:
        - label: I'd like to implement this feature and submit a PR
